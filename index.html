<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Jarvis</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#212121;--sb:#171717;--inp:#2f2f2f;--bdr:#3a3a3a;
  --tx:#ececec;--dim:#8e8ea0;--acc:#10a37f;--acc2:#0d8a6c;
  --ubg:#2f2f2f;--font:'Segoe UI',system-ui,sans-serif;
  --mono:'Fira Code',Consolas,monospace;
  --warn:#e87e7e;--ok:#4caf50;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--font);overflow:hidden;-webkit-text-size-adjust:100%}
.layout{display:flex;height:100vh;height:var(--vh,100dvh);overflow:hidden}

/* sidebar */
.sidebar{width:260px;min-width:260px;background:var(--sb);display:flex;flex-direction:column;border-right:1px solid var(--bdr);padding:14px}
.logo{display:flex;align-items:center;gap:10px;padding:10px 4px 14px;border-bottom:1px solid var(--bdr);margin-bottom:12px}
.logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--acc),#0d6efd);display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-name{font-weight:700;font-size:15px}
.logo-sub{font-size:11px;color:var(--dim)}
.btn-new{width:100%;padding:10px 14px;border-radius:8px;background:var(--inp);border:1px solid var(--bdr);color:var(--tx);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.btn-new:hover{background:#3a3a3a;border-color:var(--acc)}
.sb-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--bdr);font-size:11px;color:var(--dim);line-height:1.7}
.online{color:#7ec87e}

/* main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.hdr{padding:12px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;backdrop-filter:blur(8px);background:rgba(33,33,33,.85)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-title{font-weight:600;font-size:15px}
.btn-clr{padding:6px 14px;border-radius:8px;border:1px solid var(--bdr);background:transparent;color:var(--dim);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.btn-clr:hover{background:var(--inp);color:var(--tx);border-color:#555}

/* messages */
.msgs{flex:1;overflow-y:auto;padding:20px 0;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:5px}
.msgs::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
.msg{max-width:780px;margin:0 auto;padding:8px 20px;display:flex;gap:12px;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-top:3px}
.av.user{background:#5865f2;color:#fff}
.av.agent{background:var(--acc);color:#fff}
.bbl{flex:1;min-width:0;padding-top:3px}
.bbl .lbl{font-size:12px;font-weight:600;margin-bottom:5px}
.bbl .txt{font-size:14px;line-height:1.75;color:var(--tx);word-break:break-word;white-space:pre-wrap}
.bbl.user .txt{background:var(--ubg);border-radius:12px;padding:10px 14px;display:inline-block}

/* markdown */
.bbl .txt code{background:#1a1a1a;padding:2px 5px;border-radius:4px;font-family:var(--mono);font-size:12.5px;color:#e0e0e0}
.bbl .txt pre{background:#111;border:1px solid var(--bdr);border-radius:8px;padding:12px;margin:8px 0;overflow-x:auto;font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre}
.bbl .txt pre code{background:none;padding:0;font-size:inherit}
.bbl .txt strong{color:#fff;font-weight:600}
.bbl .txt h3{font-size:15px;margin:12px 0 6px;color:#fff}

/* thinking */
.thinking{display:flex;align-items:center;gap:8px;padding:6px 0;color:var(--dim);font-size:13px}
.thinking-dots{display:flex;gap:3px}
.thinking-dots span{width:6px;height:6px;border-radius:50%;background:var(--acc);opacity:.4;animation:pulse 1.2s ease-in-out infinite}
.thinking-dots span:nth-child(2){animation-delay:.2s}
.thinking-dots span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.4;transform:scale(1)}40%{opacity:1;transform:scale(1.2)}}

/* stop */
.stop-bar{max-width:780px;margin:0 auto;padding:0 20px}
.stop-btn{display:none;width:100%;padding:8px;border-radius:8px;border:1px solid #555;background:var(--inp);color:var(--tx);font-size:13px;cursor:pointer;margin-bottom:6px}
.stop-btn:hover{background:#444;border-color:var(--warn)}
.stop-btn.visible{display:block}

/* cursor */
.cur{display:inline-block;width:7px;height:14px;background:var(--acc);border-radius:2px;animation:bl .7s steps(1) infinite;vertical-align:text-bottom}
@keyframes bl{50%{opacity:0}}

/* empty */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px 20px;text-align:center}
.empty-icon{filter:drop-shadow(0 0 20px rgba(16,163,127,.3))}
.empty-h{font-size:22px;font-weight:700}
.empty-s{color:var(--dim);font-size:13px;max-width:380px;line-height:1.6}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.chip{padding:8px 16px;border:1px solid var(--bdr);border-radius:20px;font-size:12px;color:var(--dim);cursor:pointer;transition:all .18s;background:var(--inp)}
.chip:hover{border-color:var(--acc);color:var(--tx);background:#1a2a1a;transform:translateY(-1px)}

/* input */
.inp-area{padding:10px 20px 18px;flex-shrink:0;background:var(--bg);border-top:1px solid var(--bdr)}
.inp-box{max-width:780px;margin:0 auto;background:var(--inp);border:1px solid var(--bdr);border-radius:14px;display:flex;align-items:flex-end;gap:6px;padding:10px 10px 10px 16px;transition:border-color .15s,box-shadow .15s}
.inp-box:focus-within{border-color:var(--acc);box-shadow:0 0 0 2px rgba(16,163,127,.15)}
#userinput{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-size:14px;font-family:var(--font);resize:none;max-height:180px;line-height:1.6;padding:4px 0}
#userinput::placeholder{color:var(--dim)}
.sbtn{width:36px;height:36px;border-radius:8px;flex-shrink:0;background:var(--acc);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sbtn:hover:not(:disabled){background:var(--acc2);transform:scale(1.05)}
.sbtn:disabled{background:#333;cursor:not-allowed}
.voice-mode-btn{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#10a37f,#0d6efd);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:#fff;font-size:16px;box-shadow:0 0 12px rgba(16,163,127,.3)}
.voice-mode-btn:hover{transform:scale(1.1);box-shadow:0 0 20px rgba(16,163,127,.5)}
.inp-hint{text-align:center;font-size:11px;color:var(--dim);margin-top:7px;max-width:780px;margin-left:auto;margin-right:auto}
.inp-hint kbd{background:#333;padding:1px 5px;border-radius:3px;font-size:10px;font-family:var(--mono);border:1px solid #444}

/* Voice Mode Overlay */
.voice-overlay{position:fixed;inset:0;z-index:2000;background:radial-gradient(ellipse at center,#1a1a2e 0%,#0d0d1a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;opacity:0;pointer-events:none;transition:opacity .3s ease}
.voice-overlay.active{opacity:1;pointer-events:all}
.vo-status{font-size:14px;color:#888;font-weight:500;letter-spacing:.5px;text-transform:uppercase;min-height:22px}
.vo-transcript{font-size:18px;color:var(--tx);max-width:600px;text-align:center;min-height:60px;line-height:1.6;padding:0 20px;word-break:break-word}
.vo-transcript.interim{color:#666;font-style:italic}
.vo-orb-wrap{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.vo-orb{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#10a37f,#0d6efd);box-shadow:0 0 60px rgba(16,163,127,.3);transition:transform .3s,box-shadow .3s;display:flex;align-items:center;justify-content:center}
.vo-orb-wrap:hover .vo-orb{transform:scale(1.05)}
.vo-orb.listening{animation:orb-pulse 1.5s ease-in-out infinite}
.vo-orb.speaking{animation:orb-speak .8s ease-in-out infinite;background:radial-gradient(circle at 40% 40%,#8b5cf6,#6d28d9)}
.vo-orb.thinking{animation:orb-think 2s linear infinite;opacity:.7}
@keyframes orb-pulse{0%,100%{transform:scale(1);box-shadow:0 0 60px rgba(16,163,127,.3)}50%{transform:scale(1.12);box-shadow:0 0 100px rgba(16,163,127,.5)}}
@keyframes orb-speak{0%,100%{transform:scale(1);box-shadow:0 0 60px rgba(139,92,246,.3)}50%{transform:scale(1.08);box-shadow:0 0 90px rgba(139,92,246,.5)}}
@keyframes orb-think{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(.95)}100%{transform:rotate(360deg) scale(1)}}
.vo-rings{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(16,163,127,.15);animation:ring-expand 2s ease-out infinite;pointer-events:none}
.vo-rings:nth-child(2){animation-delay:.5s}
.vo-rings:nth-child(3){animation-delay:1s}
@keyframes ring-expand{0%{transform:scale(.7);opacity:.6}100%{transform:scale(1.8);opacity:0}}
.vo-orb-wrap:not(.is-listening) .vo-rings{display:none}
.vo-bottom{display:flex;gap:16px;align-items:center}
.vo-btn{width:48px;height:48px;border-radius:50%;border:1px solid #333;background:rgba(255,255,255,.06);color:#999;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:18px}
.vo-btn:hover{background:rgba(255,255,255,.12);color:#fff;border-color:#555}
.vo-btn.end{background:#e74c3c;border-color:#e74c3c;color:#fff}
.vo-btn.end:hover{background:#c0392b}
/* Language toggle */
.vo-lang{display:flex;gap:6px;margin-bottom:10px}
.vo-lang-btn{padding:6px 16px;border-radius:20px;border:1px solid #444;background:rgba(255,255,255,.06);color:#888;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.vo-lang-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.vo-lang-btn:hover:not(.active){background:rgba(255,255,255,.12);color:#ccc}
.vo-response{font-size:15px;color:#555;max-width:600px;text-align:center;line-height:1.8;padding:0 20px;max-height:220px;overflow-y:auto;word-break:break-word;scroll-behavior:smooth}
.vo-response .cap-sentence{transition:color .3s,opacity .3s}
.vo-response .cap-spoken{color:#888;opacity:.5}
.vo-response .cap-active{color:#fff;font-weight:500;text-shadow:0 0 8px rgba(16,163,127,.3)}
.vo-response .cap-upcoming{color:#555}
/* Green mic indicator — like ChatGPT's green dot */
.mic-indicator{display:none;align-items:center;gap:6px;padding:4px 10px;border-radius:16px;background:rgba(16,163,127,.15);font-size:12px;color:#10a37f;font-weight:600;letter-spacing:.3px}
.mic-indicator.active{display:flex}
.mic-indicator .mic-label{text-transform:uppercase}
.mic-dot{width:8px;height:8px;border-radius:50%;background:#10a37f;animation:mic-blink 1.2s ease-in-out infinite}
@keyframes mic-blink{0%,100%{opacity:1;box-shadow:0 0 6px #10a37f}50%{opacity:.4;box-shadow:0 0 2px #10a37f}}

@media(max-width:768px){
  .sidebar{display:none}
  .layout{height:100vh;height:100dvh}
  .msg{padding:6px 12px}
  .msg .av{width:26px;height:26px;font-size:11px}
  .bbl .txt{font-size:13px}
  .hdr{padding:8px 12px}
  .hdr-title{font-size:14px}
  .inp-area{padding:6px 10px 10px}
  .inp-box{border-radius:12px;padding:8px 8px 8px 12px}
  #userinput{font-size:16px}
  .inp-hint{display:none}
  .empty-h{font-size:18px}
  .empty-s{font-size:12px}
  .chips{gap:6px}
  .chip{padding:6px 12px;font-size:11px}
  .vo-orb-wrap{width:140px;height:140px}
  .vo-orb{width:100px;height:100px}
  .vo-transcript{font-size:15px;padding:0 12px}
  .vo-response{font-size:13px;padding:0 12px;max-height:150px}
  .stop-btn{font-size:12px;padding:6px}
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">
      <div class="empty-icon"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="var(--acc)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/><path d="M8 12h8"/><circle cx="12" cy="12" r="3"/></svg></div>
      <div>
        <div class="logo-name">Jarvis</div>
        <div class="logo-sub">Personal AI Assistant</div>
      </div>
    </div>
    <button class="btn-new" onclick="newChat()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New chat
    </button>
    <div class="sb-foot">
      <div style="margin-top:4px">Created by Atul Chauhan</div>
    </div>
  </aside>

  <main class="main">
    <header class="hdr">
      <div class="hdr-left"><div class="hdr-title">Jarvis</div><div class="mic-indicator" id="mic-indicator"><div class="mic-dot"></div><span class="mic-label" id="mic-label">Listening</span></div></div>
      <button class="btn-clr" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        Clear
      </button>
    </header>

    <div class="msgs" id="msgs">
      <div class="empty" id="empty">
        <div class="empty-icon"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="var(--acc)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/><path d="M8 12h8"/><circle cx="12" cy="12" r="3"/></svg></div>
        <div class="empty-h">Hey Atul</div>
        <div class="empty-s">I'm Jarvis, your personal AI assistant. Ask me anything — tech, code, strategy, or just chat.</div>
        <div class="chips">
          <div class="chip" onclick="suggest('Explain how React hooks work')">⚛️ React hooks</div>
          <div class="chip" onclick="suggest('What are the best D2C growth strategies?')">📈 D2C growth</div>
          <div class="chip" onclick="suggest('Help me optimize a slow SQL query')">🔧 Optimize SQL</div>
          <div class="chip" onclick="suggest('Who created you?')">👤 About you</div>
        </div>
      </div>
    </div>

    <div class="inp-area">
      <div class="stop-bar"><button class="stop-btn" id="stopbtn" onclick="stopGen()">■ Stop generating</button></div>
      <div class="inp-box">
        <textarea id="userinput" rows="1" placeholder="Ask Jarvis anything…"></textarea>
        <button class="sbtn" id="sbtn" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
        <button class="voice-mode-btn" id="voicemodebtn" title="Voice Mode"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
      </div>
      <div class="inp-hint"><kbd>Enter</kbd> send · <kbd>Shift+Enter</kbd> new line · <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg> Voice mode</div>
    </div>
  </main>
</div>

<!-- Voice Mode Overlay -->
<div class="voice-overlay" id="voice-overlay">
  <div class="vo-status" id="vo-status">TAP TO START</div>
  <div class="vo-transcript" id="vo-transcript"></div>
  <div class="vo-orb-wrap" id="vo-orb-wrap" onclick="voiceOrbTap()">
    <div class="vo-rings"></div><div class="vo-rings"></div><div class="vo-rings"></div>
    <div class="vo-orb" id="vo-orb"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></div>
  </div>
  <div class="vo-response" id="vo-response"></div>
  <div class="vo-lang" id="vo-lang">
    <button class="vo-lang-btn active" data-lang="en" onclick="setVoiceLang('en')">English</button>
    <button class="vo-lang-btn" data-lang="hi" onclick="setVoiceLang('hi')">Hindi</button>
    <button class="vo-lang-btn" data-lang="auto" onclick="setVoiceLang('auto')">Auto</button>
  </div>
  <div class="vo-bottom"><button class="vo-btn end" onclick="endVoiceMode()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
</div>

<script>
'use strict';

// Kill any leftover speech from previous page load immediately
if(window.speechSynthesis){speechSynthesis.cancel();}
window.addEventListener('beforeunload',()=>{
  if(window.speechSynthesis)speechSynthesis.cancel();
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  if(voiceRec){try{voiceRec.abort();}catch(_){}}
});
window.addEventListener('pagehide',()=>{if(window.speechSynthesis)speechSynthesis.cancel();});

let busy=false,abortCtrl=null;

// ── Voice ──────────────────────────────────────────────────────────────────
// Architecture: getUserMedia captures mic → green indicator appears.
// Chrome 135+: pass audioTrack directly to SpeechRecognition.start(audioTrack)
// Older Chrome: SpeechRecognition uses its own mic handle (getUserMedia released first)
let voiceMode=false,voiceRec=null,speaking=false,silenceTimer=null,finalTxt='',interimTxt='';
let SR=null,micStream=null,audioTrackSupported=false,networkRetries=0;
let speechQueue=[];
let ttsPrimed=false;
let ttsWorks=null;
const SILENCE_MS_EN=1300;
const SILENCE_MS_HI=1800; // Hindi needs longer pauses
function silenceMs(){return voiceLang==='hi'?SILENCE_MS_HI:SILENCE_MS_EN;}
const IS_OPERA=navigator.userAgent.includes('OPR')||navigator.userAgent.includes('Opera');
const IS_SAFARI=/^((?!chrome|android|crios|fxios|opr).)*safari/i.test(navigator.userAgent);

// Language setting: 'en' | 'hi' | 'auto'
let voiceLang='en';
function setVoiceLang(lang){
  voiceLang=lang;
  document.querySelectorAll('.vo-lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  // Restart recognition with new lang if currently listening
  if(voiceMode&&voiceRec&&!speaking&&!busy){
    const old=voiceRec;voiceRec=null;
    try{if(old)old.abort();}catch(_){}
    startListening();
  }
}
function getRecLang(){
  if(voiceLang==='hi')return 'hi-IN';
  if(voiceLang==='en')return 'en-IN';
  return 'hi-IN'; // auto: hi-IN recognizes both Hindi and English
}

// Caption tracking for voice overlay
let captionSentences=[];  // [{text, el}]
let captionIdx=-1;        // index of currently speaking sentence

function vlog(){}

function initVoice(){
  SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){try{const t=new SR();audioTrackSupported='start' in t && t.start.length>=0;}catch(_){}}
  // Eagerly load TTS voices — Opera/Firefox load async and need polling
  if(window.speechSynthesis){
    let voiceLoadAttempts=0;
    function tryLoadVoices(){
      const v=speechSynthesis.getVoices();
      if(v.length>0||voiceLoadAttempts>10)return;
      voiceLoadAttempts++;
      setTimeout(tryLoadVoices,300);
    }
    speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
    tryLoadVoices();
    // Extra retries for Opera which is very slow
    [200,500,1000,2000,3500].forEach(d=>setTimeout(()=>speechSynthesis.getVoices(),d));
  }
}

function primeTTS(){
  if(!window.speechSynthesis||ttsPrimed)return;
  try{
    if(!IS_OPERA)speechSynthesis.cancel(); // Opera: never cancel on idle
    const u=new SpeechSynthesisUtterance(' ');
    u.volume=0.01;u.rate=1;u.pitch=1;
    u.onend=()=>{ttsPrimed=true;};
    u.onerror=()=>{ttsPrimed=true;};
    u.onstart=()=>{ttsPrimed=true;};
    setTimeout(()=>{
      try{speechSynthesis.speak(u);}catch(_){ttsPrimed=true;}
      setTimeout(()=>{ttsPrimed=true;if(!IS_OPERA){try{speechSynthesis.cancel();}catch(_){}}},500);
    },IS_OPERA?50:30);
  }catch(_){ttsPrimed=true;}
}

function makeRec(){
  if(!SR)return null;
  const r=new SR();
  r.continuous=true;r.interimResults=true;r.lang=getRecLang();r.maxAlternatives=1;

  function commitSpeech(){
    clearTimeout(silenceTimer);silenceTimer=null;
    if(!voiceMode)return;
    if(interimTxt){finalTxt=(finalTxt+(finalTxt?' ':'')+interimTxt).trim();interimTxt='';}
    if(finalTxt&&!busy){
      // Stop recognizer and send directly — don't rely on onend chain
      const old=voiceRec;voiceRec=null;
      try{if(old)old.abort();}catch(_){}
      voiceSend();
    }
  }

  function startSilenceCountdown(ms){
    clearTimeout(silenceTimer);
    silenceTimer=setTimeout(commitSpeech,ms);
  }

  r.onaudiostart=()=>{networkRetries=0;};
  r.onspeechstart=()=>{
    clearTimeout(silenceTimer);silenceTimer=null;
    // Interrupt: user started speaking while Jarvis is talking/streaming
    if(speaking||busy){
      speechQueue=[];
      if(window.speechSynthesis)speechSynthesis.cancel();
      speaking=false;
      if(abortCtrl){abortCtrl.abort();abortCtrl=null;}
      busy=false;
      $('vo-status').textContent='LISTENING...';setOrb('listening');
    }
  };
  r.onspeechend=()=>{
    startSilenceCountdown(silenceMs());
  };
  r.onresult=(e)=>{
    // Rebuild full transcript from all results — prevents duplicates with continuous=true
    let allFinal='',interim='';
    for(let i=0;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal)allFinal+=(allFinal?' ':'')+t.trim();
      else interim+=t;
    }
    finalTxt=allFinal;
    interimTxt=interim.trim();
    const display=(finalTxt+(finalTxt&&interimTxt?' ':'')+interimTxt).trim();
    $('vo-transcript').textContent=display;
    $('vo-transcript').classList.toggle('interim',!allFinal&&!!interim);
    // After final result → shorter wait, interim → full silence timer
    startSilenceCountdown(allFinal ? (voiceLang==='hi'?1000:700) : silenceMs());
  };
  r.onend=()=>{
    clearTimeout(silenceTimer);silenceTimer=null;
    if(r!==voiceRec)return;
    if(!voiceMode)return;
    // If we still have text, send it (backup for when abort triggers onend)
    if(interimTxt){finalTxt=(finalTxt+(finalTxt?' ':'')+interimTxt).trim();interimTxt='';}
    if(finalTxt&&!busy){
      const old=voiceRec;voiceRec=null;
      try{if(old&&old!==r)old.abort();}catch(_){}
      voiceSend();
    }
    else if(!speaking&&!busy){setTimeout(startListening,80);}
  };
  r.onerror=(e)=>{
    clearTimeout(silenceTimer);silenceTimer=null;
    if(r!==voiceRec)return;
    if(!voiceMode)return;
    if(e.error==='not-allowed'){
      const isMobile=/iPhone|iPad|Android|Mobile/i.test(navigator.userAgent);
      $('vo-status').textContent=isMobile?'MIC BLOCKED — BROWSER SETTINGS → ALLOW MIC':'MIC BLOCKED — CLICK 🔒 → ALLOW MIC';
      setTimeout(endVoiceMode,5000);
    }
    else if(e.error==='audio-capture'){
      $('vo-status').textContent='NO MIC — CHECK SYSTEM PREFERENCES';
      setTimeout(endVoiceMode,5000);
    }
    else if(e.error==='network'){
      networkRetries++;
      if(networkRetries>=3){$('vo-status').textContent='NETWORK ERROR';setTimeout(endVoiceMode,3000);return;}
      setTimeout(startListening,1500);return;
    }
    else if(e.error==='no-speech'){
      // With continuous=true, Chrome fires no-speech after ~5s silence. Just restart.
      if(!speaking&&!busy)setTimeout(startListening,100);
    }
    else if(e.error!=='aborted'){setTimeout(startListening,200);}
  };
  return r;
}

function startListening(){
  if(!voiceMode)return;
  // Don't block on busy — we need background listener for interrupts during streaming
  try{if(voiceRec)voiceRec.abort();}catch(_){}
  voiceRec=makeRec();
  if(!voiceRec){$('vo-status').textContent='NOT SUPPORTED — USE CHROME';return;}
  if(!speaking&&!busy){$('vo-status').textContent='LISTENING...';setOrb('listening');}
  try{
    if(micStream){
      const track=micStream.getAudioTracks()[0];
      if(track){
        try{voiceRec.start(track);return;}
        catch(_){}
      }
    }
    voiceRec.start();
  }catch(err){
    $('vo-status').textContent='MIC ERROR: '+err.message;
  }
}

async function startVoiceMode(){
  if(!SR){alert('Speech recognition not supported. Use Chrome or Edge.');return;}
  voiceMode=true;finalTxt='';interimTxt='';speaking=false;
  $('voice-overlay').classList.add('active');
  $('vo-transcript').textContent='';$('vo-response').innerHTML='';
  $('mic-indicator').classList.add('active');
  // Mobile browsers require TTS to be unlocked from a direct user gesture.
  primeTTS();
  vlog('Voice mode ON');

  // Try getUserMedia for green indicator + audioTrack sharing
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    vlog('🎤 getUserMedia OK: '+micStream.getAudioTracks().map(t=>t.label).join(', '));
  }catch(err){
    vlog('getUserMedia failed ('+err.message+') — using SpeechRecognition alone');
    micStream=null;
  }
  // Small delay for USB mics to stabilize
  await new Promise(r=>setTimeout(r,80));
  if(!voiceMode)return;
  startListening();
}

function endVoiceMode(){
  voiceMode=false;speaking=false;
  clearTimeout(silenceTimer);silenceTimer=null;
  speechQueue=[];
  if(abortCtrl){abortCtrl.abort();abortCtrl=null;}
  busy=false;
  const oldR=voiceRec;voiceRec=null;
  try{if(oldR){oldR.abort();}}catch(_){}
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  if(window.speechSynthesis)speechSynthesis.cancel();
  $('voice-overlay').classList.remove('active');
  $('mic-indicator').classList.remove('active');
  setOrb('idle');
}

function voiceOrbTap(){
  if(speaking||busy){
    // Force stop everything
    speechQueue=[];speechSynthesis.cancel();speaking=false;busy=false;
    if(abortCtrl){abortCtrl.abort();abortCtrl=null;}
    finalTxt='';interimTxt='';
    $('vo-transcript').textContent='';$('vo-response').innerHTML='';
    $('vo-status').textContent='LISTENING...';setOrb('listening');
    setTimeout(startListening,300);
  } else {
    if(interimTxt){finalTxt=(finalTxt+(finalTxt?' ':'')+interimTxt).trim();interimTxt='';}
    if(finalTxt){clearTimeout(silenceTimer);silenceTimer=null;const o=voiceRec;voiceRec=null;try{if(o)o.abort();}catch(_){}voiceSend();}
  }
}

function setOrb(s){
  $('vo-orb').className='vo-orb'+(s!=='idle'?' '+s:'');
  $('vo-orb-wrap').classList.toggle('is-listening',s==='listening');
  const lbl=$('mic-label');
  if(lbl){
    if(s==='listening')lbl.textContent='Listening';
    else if(s==='thinking')lbl.textContent='Thinking';
    else if(s==='speaking')lbl.textContent='Speaking';
    else lbl.textContent='Voice Mode';
  }
}

async function voiceSend(){
  if(!finalTxt||busy)return;
  const msg=finalTxt.trim();finalTxt='';interimTxt='';
  // Clear old recognizer — null FIRST so stale onend is ignored
  const oldRec=voiceRec;voiceRec=null;
  try{if(oldRec)oldRec.abort();}catch(_){}
  $('vo-status').textContent='THINKING...';setOrb('thinking');
  $('vo-transcript').textContent=msg;$('vo-transcript').classList.remove('interim');
  appendMsg('user',msg);
  const{bbl,txt}=appendMsg('agent','',true);
  busy=true;let raw='',first=true;

  // Streaming speech state
  let speechBuf='',speechActive=false,streamDone=false;
  speechQueue=[];
  captionSentences=[];captionIdx=-1;
  $('vo-response').innerHTML='';
  if(voiceMode){speaking=true;}

  function cleanForSpeech(s){
    return s
      .replace(/```[\s\S]*?```/g,' ')           // code blocks
      .replace(/<[^>]+>/g,'')                    // html tags
      .replace(/\p{Extended_Pictographic}/gu,'') // ALL emojis (comprehensive)
      .replace(/[\u2600-\u27BF]/gu,'')           // misc symbols not in Extended_Pictographic
      .replace(/[\uFE00-\uFE0F]/gu,'')           // variation selectors (emoji modifiers)
      .replace(/[\u20D0-\u20FF]/gu,'')           // combining enclosing marks
      .replace(/https?:\/\/\S+/g,' ')            // urls
      .replace(/[*_#`\[\]~>|{}()]/g,'')          // markdown + brackets
      .replace(/\d+\/\d+/g,' ')                  // fractions like 4/10
      .replace(/\//g,' ')                         // stray slashes
      .replace(/,/g,' ')                          // commas — TTS handles pauses naturally
      .replace(/;/g,'.')                          // semicolons to periods
      .replace(/:/g,' ')                          // colons
      .replace(/!+/g,'.')                         // ! → .
      .replace(/\?+/g,'?')                        // normalize ?
      .replace(/\.{2,}/g,'.')                     // multiple dots → one
      .replace(/-{2,}/g,' ')                      // dashes
      .replace(/\s+/g,' ')
      .trim();
  }
  function enqueueSentence(s){
    const c=cleanForSpeech(s);
    if(!c||c.length<2)return;
    // Dedup: skip if same as last caption sentence
    if(captionSentences.length>0&&captionSentences[captionSentences.length-1].text===c)return;
    speechQueue.push(c);
    // Add caption sentence to overlay
    const el=document.createElement('span');
    el.className='cap-sentence cap-upcoming';
    el.textContent=c+' ';
    $('vo-response').appendChild(el);
    captionSentences.push({text:c,el});
    if(!speechActive)drainQueue();
  }
  function drainQueue(){
    // Interrupt cleared the queue — stop speaking
    if(!speaking&&speechQueue.length){speechQueue=[];speechActive=false;return;}
    if(!speechQueue.length){
      speechActive=false;
      if(streamDone){
        speaking=false;
        $('vo-status').textContent='LISTENING...';setOrb('listening');
        // Short settle delay, then resume listening
        setTimeout(()=>{
          // Null first, then abort — prevents stale onend from restarting listener
          const old=voiceRec;voiceRec=null;
          try{if(old)old.abort();}catch(_){}
          voiceResume();
        },120);
      }
      return;
    }
    speechActive=true;
    if(!speaking){speaking=true;}
    $('vo-status').textContent='SPEAKING...';setOrb('speaking');
    // Start background interrupt listener if not already running
    if(!voiceRec)startListening();
    // Advance caption highlight
    captionIdx++;
    if(captionIdx<captionSentences.length){
      const s=captionSentences[captionIdx];
      s.el.classList.remove('cap-upcoming');
      s.el.classList.add('cap-active');
      // Auto-scroll caption into view
      s.el.scrollIntoView({behavior:'smooth',block:'center'});
    }
    speakOne(speechQueue.shift(),()=>{
      // Mark current caption as spoken
      if(captionIdx>=0&&captionIdx<captionSentences.length){
        const s=captionSentences[captionIdx];
        s.el.classList.remove('cap-active');
        s.el.classList.add('cap-spoken');
      }
      drainQueue();
    });
  }

  try{
    abortCtrl=new AbortController();
    const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg}),signal:abortCtrl.signal});
    if(!res.ok){txt.textContent='Error: '+res.status;busy=false;speaking=false;abortCtrl=null;voiceResume();return;}
    const reader=res.body.getReader(),dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        let ev;try{ev=JSON.parse(line.slice(6));}catch{continue;}
        if(ev.type==='token'){
          if(first){txt.innerHTML='';first=false;}
          raw+=ev.content;
          txt.innerHTML=renderMd(raw)+'<span class="cur"></span>';
          const c=raw.replace(/```[\s\S]*?```/g,'').replace(/[*_#`\[\]]/g,'').trim();
          if(c){
            // Don't overwrite captions — they're managed by enqueueSentence now
          }
          scrollDown();
          // Stream speech: flush on sentence/clause boundaries
          if(voiceMode){
            speechBuf+=ev.content;
            // Hindi danda (।) and standard sentence endings — NOT comma
            const m=speechBuf.match(/^([\s\S]*?[.!?\n।])\s*/);
            // Hindi: require longer chunks for natural flow
            const minLen=voiceLang==='hi'?15:3;
            if(m&&m[1].replace(/[^\w\u0900-\u097F]/g,'').length>minLen){
              enqueueSentence(m[1]);
              speechBuf=speechBuf.slice(m[0].length);
            } else if(speechBuf.length>(voiceLang==='hi'?150:60)){
              // Flush long buffers — much higher threshold for Hindi for natural phrasing
              const sp=speechBuf.lastIndexOf(' ');
              if(sp>30){enqueueSentence(speechBuf.slice(0,sp));speechBuf=speechBuf.slice(sp+1);}
            }
          }
        } else if(ev.type==='error'){
          txt.innerHTML='<span style="color:var(--warn)">Error: '+esc(ev.content)+'</span>';
        } else if(ev.type==='done'){
          bbl.querySelectorAll('.thinking').forEach(el=>el.remove());
          if(raw)txt.innerHTML=renderMd(raw);
          scrollDown();
        }
      }
    }
  }catch(err){
    if(err.name!=='AbortError')txt.textContent='Error: '+err.message;
  }
  busy=false;abortCtrl=null;
  // Flush remaining speech buffer
  if(voiceMode&&speechBuf.trim()){enqueueSentence(speechBuf);speechBuf='';
  } else if(voiceMode&&!speechActive&&!speechQueue.length){
    speaking=false;streamDone=true;
    // If model didn't end with a question, speak a follow-up before resuming listener
    if(raw && !/\?[\s"']*$/.test(raw.trim())){
      const followUps=['Anything else, boss?','What else, boss?',"What's next, boss?",'Need anything else, boss?'];
      enqueueSentence(followUps[Math.floor(Math.random()*followUps.length)]);
    }
    setTimeout(()=>{const o=voiceRec;voiceRec=null;try{if(o)o.abort();}catch(_){}voiceResume();},120);
    return;
  }
  streamDone=true;
  // If model didn't end with a question, queue follow-up before draining finishes
  if(raw && !/\?[\s"']*$/.test(raw.trim())){
    const followUps=['Anything else, boss?','What else, boss?',"What's next, boss?",'Need anything else, boss?'];
    enqueueSentence(followUps[Math.floor(Math.random()*followUps.length)]);
  }
  if(!speechActive&&!speechQueue.length){speaking=false;setTimeout(()=>{const o=voiceRec;voiceRec=null;try{if(o)o.abort();}catch(_){}voiceResume();},120);}
}

function speakOne(text,cb){
  if(!window.speechSynthesis||!text||!speaking){cb();return;}
  if(!ttsPrimed)primeTTS();
  // Strip ALL emojis, symbols, and problematic chars before TTS
  let c=text
    .replace(/\p{Extended_Pictographic}/gu,'')
    .replace(/[\u2600-\u27BF]/gu,'')
    .replace(/[\uFE00-\uFE0F]/gu,'')
    .replace(/[*_#`\[\]~>|{}()]/g,'')
    .replace(/\d+\/\d+/g,' ')       // fractions like 4/10
    .replace(/\//g,' ')              // stray slashes
    .replace(/,/g,' ')               // commas — avoid TTS saying "comma"
    .replace(/;/g,'.')               // semicolons
    .replace(/:/g,' ')               // colons
    .replace(/-{2,}/g,' ')           // dashes
    .replace(/!+/g,'.').replace(/https?:\/\/\S+/g,' ')
    .replace(/\.{2,}/g,'.')
    .replace(/\s+/g,' ').trim();
  if(!c||c.length<2){cb();return;}
  const isHindi=/[\u0900-\u097F]/.test(c);
  const isHinglish=!isHindi&&/\b(kya|kaise|karo|bhai|yaar|acha|theek|nahi|haan|abhi|kuch|mujhe|tum|mere|tera|mera|kaha|bol|sun|dekh|chal|kar|hai|ho|hu|hum|aap|ji|woh|yeh|bas|sab|log)\b/i.test(c);
  // Devanagari text MUST use Hindi voice — override user selector
  // User selector only matters for non-Devanagari text
  const useLang=isHindi?'hi':(voiceLang==='hi'?'hi':voiceLang==='en'?'en':(isHinglish?'hinglish':'en'));

  function pickVoice(voices){
    if(!voices||!voices.length)return null;
    // Log available voices for debugging
    console.log('[TTS] useLang='+useLang+' voices='+voices.length+' text="'+c.slice(0,40)+'..."');
    console.log('[TTS] hi-IN voices:', voices.filter(x=>x.lang&&x.lang.startsWith('hi')).map(x=>x.name+'/'+x.lang));
    if(useLang==='hi'){
      // MUST use hi-IN voice for Devanagari — no English fallback
      const hiVoices=voices.filter(x=>x.lang&&(x.lang==='hi-IN'||x.lang.startsWith('hi')));
      const google=hiVoices.find(x=>/google/i.test(x.name));
      if(google){console.log('[TTS] picked Google Hindi');return google;}
      const premium=hiVoices.find(x=>/premium|enhanced|natural/i.test(x.name));
      if(premium){console.log('[TTS] picked premium Hindi');return premium;}
      // Lekha is the standard macOS Hindi voice
      const lekha=hiVoices.find(x=>/lekha/i.test(x.name));
      if(lekha){console.log('[TTS] picked Lekha');return lekha;}
      if(hiVoices.length>0){console.log('[TTS] picked first hi voice: '+hiVoices[0].name);return hiVoices[0];}
      // Last resort: any voice that can handle Hindi
      console.warn('[TTS] NO Hindi voice found! Falling back.');
      return voices.find(x=>x.lang==='en-IN')||voices[0];
    }
    if(useLang==='hinglish'){
      // Indian English accent is perfect for Hinglish
      const rishi=voices.find(x=>x.lang==='en-IN'&&/rishi/i.test(x.name));
      return rishi
        ||voices.find(x=>x.lang==='en-IN')
        ||voices.find(x=>x.lang&&x.lang.startsWith('en'))
        ||voices[0];
    }
    // English
    const femaleNames=/female|girl|woman|samantha|siri|victoria|karen|moira|tessa|fiona|veena/i;
    const preferred=['Daniel','Aaron','Alex','Google UK English Male','Microsoft David','Fred','Tom','Ralph'];
    const enVoices=voices.filter(x=>x.lang&&x.lang.startsWith('en'));
    const maleOnly=enVoices.filter(x=>!femaleNames.test(x.name));
    return maleOnly.find(x=>preferred.some(p=>x.name.includes(p)))||maleOnly[0]||enVoices[0]||voices[0];
  }

  function doSpeak(voices){
    if(!speaking){cb();return;}

    const u=new SpeechSynthesisUtterance(c);
    const v=pickVoice(voices);
    if(v)u.voice=v;
    // Hindi TTS tuning: Lekha (hi-IN) needs much slower rate for fluency
    // Lower rate = more natural pronunciation, less robotic
    const isUsingEnVoice=v&&v.lang&&v.lang.startsWith('en');
    const isUsingHiVoice=v&&v.lang&&v.lang.startsWith('hi');
    if(useLang==='hi'){
      // Lekha on macOS: rate 0.78 sounds most natural for Hindi
      // Lower = more careful pronunciation, sounds like a real Hindi speaker
      u.rate=isUsingHiVoice?0.78:0.85;
      u.pitch=isUsingHiVoice?0.95:1.0; // Slightly lower pitch for Lekha = less robotic
    } else if(useLang==='hinglish'){
      u.rate=0.95;u.pitch=1.0;
    } else {
      u.rate=1.05;u.pitch=1.0;
    }
    u.volume=1.0;
    // Set lang to match content — Devanagari MUST have hi-IN or TTS is silent
    const hasDevanagari=/[\u0900-\u097F]/.test(c);
    u.lang=hasDevanagari?'hi-IN':(v&&v.lang)||'en-IN';

    let done=false;
    const finish=()=>{if(done)return;done=true;clearInterval(keepAlive);clearTimeout(safetyT);cb();};
    // Safety timeout — extra generous for Hindi (slower TTS rate, longer text)
    const hiBoost=useLang==='hi'?2.0:useLang==='hinglish'?1.3:1;
    const safetyMs=Math.min(Math.round((5000+c.length*150)*hiBoost),45000);
    const safetyT=setTimeout(finish,safetyMs);

    u.onend=finish;
    u.onerror=finish;

    // Keep alive — resume if paused (Chrome/Opera pause after ~15s)
    const keepAlive=setInterval(()=>{
      try{if(speechSynthesis.paused)speechSynthesis.resume();}catch(_){}
    },250);

    // Opera: do NOT cancel() before speak — it kills TTS entirely.
    // Safari/Chrome: cancel() is fine and clears stale queues.
    if(IS_OPERA){
      // Opera: just speak directly, no cancel
      try{speechSynthesis.speak(u);}catch(_){finish();}
    } else {
      try{speechSynthesis.cancel();}catch(_){}
      setTimeout(()=>{
        try{speechSynthesis.resume();speechSynthesis.speak(u);}catch(_){finish();}
      },30);
    }
  }

  // Get voices
  let voices=speechSynthesis.getVoices();
  if(voices.length>0){doSpeak(voices);return;}
  let resolved=false;
  const resolveVoices=()=>{if(resolved)return;resolved=true;speechSynthesis.onvoiceschanged=null;clearInterval(pollV);doSpeak(speechSynthesis.getVoices());};
  speechSynthesis.onvoiceschanged=resolveVoices;
  const pollV=setInterval(()=>{if(speechSynthesis.getVoices().length>0)resolveVoices();},150);
  setTimeout(resolveVoices,2500);
}

function voiceResume(){
  if(!voiceMode)return;
  finalTxt='';interimTxt='';
  captionSentences=[];captionIdx=-1;
  $('vo-transcript').textContent='';$('vo-response').innerHTML='';
  startListening();
}

// ── Init ───────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
document.addEventListener('DOMContentLoaded',async()=>{
  initVoice();
  $('sbtn').addEventListener('click',send);
  $('voicemodebtn').addEventListener('click',startVoiceMode);
  $('userinput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
  $('userinput').addEventListener('input',autoResize);
  // Mobile: keep input visible when keyboard opens
  $('userinput').addEventListener('focus',()=>{setTimeout(scrollDown,300);});
  // Use visualViewport to handle mobile keyboard resize
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',()=>{
      document.documentElement.style.setProperty('--vh',window.visualViewport.height+'px');
      scrollDown();
    });
    document.documentElement.style.setProperty('--vh',window.visualViewport.height+'px');
  }
});

// ── Helpers ────────────────────────────────────────────────────────────────
function scrollDown(){const el=$('msgs');requestAnimationFrame(()=>{el.scrollTop=el.scrollHeight;});}
function autoResize(){const ta=$('userinput');ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,180)+'px';}
function removeEmpty(){const e=$('empty');if(e)e.remove();}
function suggest(t){$('userinput').value=t;send();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderMd(t){let h=esc(t);h=h.replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>'<pre><code>'+c+'</code></pre>');h=h.replace(/`([^`]+)`/g,'<code>$1</code>');h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');return h;}

const EMPTY_HTML='<div class="empty" id="empty"><div class="empty-icon"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="var(--acc)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/><path d="M8 12h8"/><circle cx="12" cy="12" r="3"/></svg></div><div class="empty-h">Hey Atul</div><div class="empty-s">I\'m Jarvis, your personal AI assistant. Ask me anything — tech, code, strategy, or just chat.</div><div class="chips"><div class="chip" onclick="suggest(\'Explain how React hooks work\')">⚛️ React hooks</div><div class="chip" onclick="suggest(\'What are the best D2C growth strategies?\')">📈 D2C growth</div><div class="chip" onclick="suggest(\'Help me optimize a slow SQL query\')">🔧 Optimize SQL</div><div class="chip" onclick="suggest(\'Who created you?\')">👤 About you</div></div></div>';

function newChat(){fetch('/clear',{method:'POST'});$('msgs').innerHTML=EMPTY_HTML;busy=false;$('sbtn').disabled=false;$('stopbtn').classList.remove('visible');}
function stopGen(){if(abortCtrl){abortCtrl.abort();abortCtrl=null;}}

function appendMsg(role,text,streaming){
  removeEmpty();
  const w=document.createElement('div');w.className='msg';
  const av=document.createElement('div');av.className='av '+role;av.textContent=role==='user'?'A':'J';
  const bbl=document.createElement('div');bbl.className='bbl '+role;
  const lbl=document.createElement('div');lbl.className='lbl';lbl.textContent=role==='user'?'You':'Jarvis';
  const txt=document.createElement('div');txt.className='txt';
  if(streaming)txt.innerHTML='<div class="thinking"><div class="thinking-dots"><span></span><span></span><span></span></div> Thinking…</div>';
  else txt.textContent=text;
  bbl.appendChild(lbl);bbl.appendChild(txt);w.appendChild(av);w.appendChild(bbl);
  $('msgs').appendChild(w);scrollDown();
  return{wrap:w,bbl,txt};
}

// ── Send ───────────────────────────────────────────────────────────────────
async function send(){
  if(busy)return;
  const ta=$('userinput'),text=ta.value.trim();if(!text)return;
  ta.value='';ta.style.height='auto';busy=true;
  $('sbtn').disabled=true;$('stopbtn').classList.add('visible');
  abortCtrl=new AbortController();
  appendMsg('user',text);
  const{bbl,txt}=appendMsg('agent','',true);
  let raw='',first=true;
  try{
    const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text}),signal:abortCtrl.signal});
    if(!res.ok){txt.textContent='Server error: '+res.status;busy=false;return;}
    const reader=res.body.getReader(),dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        let ev;try{ev=JSON.parse(line.slice(6));}catch{continue;}
        if(ev.type==='token'){if(first){txt.innerHTML='';first=false;}raw+=ev.content;txt.innerHTML=renderMd(raw)+'<span class="cur"></span>';scrollDown();}
        else if(ev.type==='error'){txt.innerHTML='<span style="color:var(--warn)">Error: '+esc(ev.content)+'</span>';}
        else if(ev.type==='loop_killed'){const w=document.createElement('div');w.style.cssText='color:var(--warn);font-size:12px;margin-top:6px';w.textContent='⚠ Repetition detected — stopped';bbl.appendChild(w);}
        else if(ev.type==='done'){bbl.querySelectorAll('.thinking').forEach(el=>el.remove());if(raw)txt.innerHTML=renderMd(raw);else if(!txt.textContent.trim())txt.innerHTML='<span style="color:var(--dim)">No response.</span>';scrollDown();}
      }
    }
  }catch(err){
    if(err.name==='AbortError'){bbl.querySelectorAll('.thinking').forEach(el=>el.remove());txt.innerHTML=(raw?renderMd(raw):'')+'<div style="color:var(--dim);font-size:12px;margin-top:6px">■ Stopped</div>';}
    else txt.textContent='Error: '+err.message;
  }
  busy=false;abortCtrl=null;$('sbtn').disabled=false;$('stopbtn').classList.remove('visible');$('userinput').focus();
  // Follow-up prompt — if model didn't naturally end with a question, append one
  if(raw && !/\?[\s"']*$/.test(raw.trim())){
    const followUps=['Anything else, boss?','What else, boss?',"What's next, boss?",'Need anything else, boss?'];
    const pick=followUps[Math.floor(Math.random()*followUps.length)];
    appendMsg('agent',pick);
  }
}
</script>
